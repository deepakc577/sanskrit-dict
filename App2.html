<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vedic Vocabulary App</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }
        h1 { color: #4a4e69; }
        .upload-section {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        input[type="file"] {
            font-size: 16px;
            padding: 10px;
        }
        #flashcard-container {
            display: none; 
        }
        .card {
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            padding: 40px 20px;
            margin: 20px 0;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .card:hover { transform: scale(1.02); }
        .word { font-size: 24px; font-weight: bold; color: #222; }
        .meaning { font-size: 18px; color: #555; margin-top: 15px; display: none; }
        
        .meaning a {
            color: #4a4e69;
            text-decoration: none;
            font-weight: bold;
            background-color: #e5e5ea;
            padding: 5px 12px;
            border-radius: 6px;
            display: inline-block;
            margin-top: 15px;
            transition: background-color 0.2s;
            cursor: pointer;
        }
        .meaning a:hover {
            background-color: #d1d1d6;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            gap: 10px;
        }
        button {
            background-color: #4a4e69;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            flex: 1;
        }
        button:hover { background-color: #22223b; }
        .shuffle-btn { background-color: #9a8c98; }
        .shuffle-btn:hover { background-color: #c9ada7; color: #222;}
        .progress { margin-top: 15px; font-size: 14px; color: #666; }
        .keyboard-hints { margin-top: 15px; font-size: 13px; color: #888; line-height: 1.5; }

        .modal-overlay {
            display: none; 
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7); 
            backdrop-filter: blur(3px);
        }
        .modal-content {
            background-color: #fff;
            margin: 5% auto;
            padding: 0;
            border-radius: 12px;
            width: 90%;
            max-width: 1600px;
            height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        .modal-header {
            background-color: #4a4e69;
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-header h3 { margin: 0; font-size: 16px; }
        .close-btn {
            color: white;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        .close-btn:hover { color: #c9ada7; }
        iframe {
            width: 100%;
            flex-grow: 1;
            border: none;
        }
    </style>
</head>
<body>

    <h1>Vedic Vocabulary App</h1>
    
    <div class="upload-section">
        <p>Upload your dictionary (.txt or .rtf) file to begin:</p>
        <input type="file" id="fileInput" accept=".txt,.rtf">
    </div>

    <div id="flashcard-container">
        <div class="card" id="flashcard" onclick="toggleMeaning()">
            <div class="word" id="cardWord">Word appears here</div>
            <div class="meaning" id="cardMeaning">Meaning appears here</div>
        </div>
        
        <div class="controls">
            <button onclick="prevCard()">&#8592; Previous</button>
            <button class="shuffle-btn" onclick="shuffleCards()">рџ”Ђ Shuffle</button>
            <button onclick="nextCard()">Next &#8594;</button>
        </div>
        <div class="progress" id="progressText"></div>
        <div class="keyboard-hints">
            <strong>Space</strong> (Flip) &bull; <strong>&larr;</strong> (Prev) &bull; <strong>&rarr;</strong> (Next) <br>
            <strong>O</strong> (Open Link) &bull; <strong>Esc</strong> (Close Link)
        </div>
    </div>

    <div id="vedaModal" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3>VedaBase Reference</h3>
                <span class="close-btn" onclick="closeModal(event)">&times;</span>
            </div>
            <iframe id="vedaIframe" src=""></iframe>
        </div>
    </div>

    <script>
        let dictionary = [];
        let currentIndex = 0;
        let isModalOpen = false; 

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            
            reader.onload = function(e) { 
                let text = e.target.result;
                
                if (file.name.endsWith('.rtf') || text.startsWith('{\\rtf')) {
                    text = stripRTF(text);
                }
                
                parseDictionary(text); 
            };
            reader.readAsText(file);
        });

        // FIXED FUNCTION: Decodes characters before stripping RTF formatting
        function stripRTF(rtf) {
            // 1. CRITICAL FIX: Convert RTF hex encoded characters (like \'e4) back into actual characters (like Г¤)
            let text = rtf.replace(/\\'([0-9a-fA-F]{2})/g, function(match, hex) {
                return String.fromCharCode(parseInt(hex, 16));
            });
            
            // 2. Replace RTF newlines (\par or \line) with actual text newlines
            text = text.replace(/\\par\b\s*/g, '\n');
            text = text.replace(/\\line\b\s*/g, '\n');
            
            // 3. Remove all other RTF control words (anything starting with \ and ending with a space)
            text = text.replace(/\\[a-zA-Z]+[-0-9]*\s?/g, '');
            
            // 4. Remove all the curly brackets {} used for RTF grouping
            text = text.replace(/[{}]/g, '');
            
            return text.replace(/\n\s*\n/g, '\n').trim();
        }

        function convertBalaramToIAST(text) {
            const balaramMap = {
                'Г¤': 'ДЃ', 'Г„': 'ДЂ', 'Г©': 'Д«', 'Г‰': 'ДЄ', 'Гј': 'Е«', 'Гњ': 'ЕЄ',
                'ГҐ': 'б№›', 'Г…': 'б№љ', 'ГЁ': 'б№ќ', 'Г€': 'б№њ', 'Г®': 'бё·', 'ГЋ': 'бё¶',
                'Г¬': 'б№…', 'ГЊ': 'б№„', 'ГЇ': 'Г±', 'ГЏ': 'Г‘', 'Г«': 'б№‡', 'Г‹': 'б№†',
                'Г¶': 'б№­', 'Г–': 'б№¬', 'ГІ': 'бёЌ', 'Г’': 'бёЊ', 'Г§': 'Е›', 'Г‡': 'Ељ',
                'Г±': 'б№Ј', 'Г‘': 'б№ў', 'Г ': 'б№Ѓ', 'ГЂ': 'б№Ђ', 'Г№': 'бёҐ', 'Г™': 'бё¤'
            };
            const regex = new RegExp(`[${Object.keys(balaramMap).join('')}]`, 'g');
            return text.replace(regex, match => balaramMap[match]);
        }

        function linkifyReferences(text) {
            text = text.replace(/\(B\/(\d+)\/(\d+)\)/g, '<br><a onclick="openModal(\'https://vedabase.io/en/library/bg/$1/$2/\', event)">рџ“– Read BG $1.$2</a>');
            text = text.replace(/\(S(\d+)\/(\d+)\/(\d+)\)/g, '<br><a onclick="openModal(\'https://vedabase.io/en/library/sb/$1/$2/$3/\', event)">рџ“– Read SB $1.$2.$3</a>      <a onclick="openModal(\'https://deepakc577.github.io/sanskrit-dict/SD1.html?searchInput=$1.$2.$3\', event)">рџ“– Read SD SB $1.$2.$3</a>');
            return text;
        }

        function parseDictionary(text) {
            dictionary = [];
            const lines = text.split('\n');
            lines.forEach(line => {
                if(line.trim() === '') return;
                const parts = line.split('--');
                if(parts.length >= 2) {
                    let rawWord = parts[0].trim();
                    let rawMeaning = parts.slice(1).join('--').trim();
                    let cleanWord = convertBalaramToIAST(rawWord);
                    let cleanMeaning = convertBalaramToIAST(rawMeaning);
                    dictionary.push({
                        word: cleanWord,
                        meaning: linkifyReferences(cleanMeaning)
                    });
                }
            });

            if(dictionary.length > 0) {
                currentIndex = 0;
                document.getElementById('flashcard-container').style.display = 'block';
                showCard(currentIndex);
            } else {
                alert("No valid words found. Check your file format.");
            }
        }

        function shuffleCards() {
            for (let i = dictionary.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [dictionary[i], dictionary[j]] = [dictionary[j], dictionary[i]];
            }
            currentIndex = 0; 
            showCard(currentIndex);
        }

        function showCard(index) {
            document.getElementById('cardWord').innerText = dictionary[index].word;
            document.getElementById('cardMeaning').innerHTML = dictionary[index].meaning;
            document.getElementById('cardMeaning').style.display = 'none'; 
            document.getElementById('progressText').innerText = `Card ${index + 1} of ${dictionary.length}`;
        }

        function toggleMeaning() {
            const meaningEl = document.getElementById('cardMeaning');
            meaningEl.style.display = (meaningEl.style.display === 'none') ? 'block' : 'none';
        }

        function nextCard() {
            if (currentIndex < dictionary.length - 1) { currentIndex++; showCard(currentIndex); }
        }

        function prevCard() {
            if (currentIndex > 0) { currentIndex--; showCard(currentIndex); }
        }

        function openModal(url, event) {
            if (event) event.stopPropagation(); 
            isModalOpen = true; 
            const modal = document.getElementById('vedaModal');
            const iframe = document.getElementById('vedaIframe');
            iframe.src = url; 
            modal.style.display = 'block'; 
            window.focus(); 
        }

        function closeModal(event) {
            if (event) event.stopPropagation();
            isModalOpen = false; 
            const modal = document.getElementById('vedaModal');
            const iframe = document.getElementById('vedaIframe');
            modal.style.display = 'none'; 
            iframe.src = ''; 
        }

        document.addEventListener('keydown', function(event) {
            if (dictionary.length === 0) return;

            if (isModalOpen) {
                if (event.key === 'Escape' || event.code === 'Escape') closeModal();
                return; 
            }

            if (event.code === 'ArrowRight') nextCard();
            else if (event.code === 'ArrowLeft') prevCard();
            else if (event.code === 'Space') { event.preventDefault(); toggleMeaning(); }
            else if (event.code === 'KeyO' || event.key === 'o') {
                const firstLink = document.querySelector('#cardMeaning a');
                if (firstLink) firstLink.click(); 
            }
        });
    </script>
</body>
</html>
